name: Agentic review barrier

on:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows:
      - CI
      - Custodian diegesis review
      - Custodian simulation-truth review
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  # Global and deliberately short-lived: the two local workflow_run events and
  # Copilot's review event can otherwise race before either writes the SHA lock.
  group: agentic-review-barrier
  cancel-in-progress: false

jobs:
  join:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_review' ||
      github.event.workflow_run.name == 'CI' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          SOURCE_EVENT: ${{ github.event_name }}
        with:
          script: |
            const state = require("./tools/agentic_review_state.cjs");
            const { owner, repo } = context.repo;
            const repository = `${owner}/${repo}`;

            async function candidateNumbers() {
              if (context.eventName === "pull_request_review") {
                return [context.payload.pull_request.number];
              }
              if (context.eventName === "workflow_run") {
                const embedded = context.payload.workflow_run.pull_requests || [];
                if (embedded.length) return embedded.map((pr) => pr.number);
                // Push-triggered runs (e.g. CI on a merge to main) have no PR
                // association and their pull_requests endpoint can 404.
                if (context.payload.workflow_run.event !== "pull_request") {
                  return [];
                }
                try {
                  const response = await github.request(
                    "GET /repos/{owner}/{repo}/actions/runs/{run_id}/pull_requests",
                    { owner, repo, run_id: context.payload.workflow_run.id },
                  );
                  return response.data.map((pr) => pr.number);
                } catch (error) {
                  if (error.status === 404) return [];
                  throw error;
                }
              }
              const pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });
              return pulls.map((pr) => pr.number);
            }

            // One bad candidate (e.g. a stale PR association on a workflow_run
            // payload) must not abort the join pass for the other PRs.
            const failures = [];
            for (const number of [...new Set(await candidateNumbers())]) {
              try {
              const { data: pull } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: number,
              });
              if (!state.isAgenticPlaytestPullRequest(pull, repository)) continue;

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: number,
                per_page: 100,
              });
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: number,
                per_page: 100,
              });
              const head = pull.head.sha;
              const workflowRuns = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  head_sha: head,
                  event: "pull_request",
                  per_page: 100,
                },
              );
              const ci = state.workflowRunState(workflowRuns);
              const missing = state.missingRequiredReviewers(
                reviews,
                comments,
                head,
              );
              const marker = state.barrierMarker(head);
              if (
                missing.length ||
                ci.status !== "completed" ||
                state.isTerminal(comments)
              ) continue;
              if (state.hasCommentMarker(comments, marker)) continue;

              const cycle = state.copilotReviewedHeads(reviews).length;
              const finalVerification = state.hasCapPendingForHead(comments, head);
              const { data: lock } = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: `${marker}\nRequired reviews are in for \`${head}\` and CI completed with **${ci.conclusion}**. Dispatching adjudication cycle ${cycle} of 3${finalVerification ? " for final cap verification" : ""}.`,
              });
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: "playtest-review-adjudicator.lock.yml",
                  ref: context.payload.repository.default_branch,
                  inputs: {
                    pull_request_number: String(number),
                    head_sha: head,
                    cycle: String(cycle),
                    ci_conclusion: String(ci.conclusion),
                    ci_run_id: String(ci.run.id),
                    final_verification: String(finalVerification),
                  },
                });
              } catch (error) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: lock.id,
                });
                throw error;
              }
              } catch (error) {
                failures.push(`#${number}: ${error.message}`);
              }
            }
            if (failures.length) {
              core.setFailed(`Barrier pass failed for ${failures.join("; ")}`);
            }
