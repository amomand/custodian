name: Agentic review watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agentic-review-watchdog
  cancel-in-progress: false

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const state = require("./tools/agentic_review_state.cjs");
            const { owner, repo } = context.repo;
            const repository = `${owner}/${repo}`;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const pull of pulls) {
              if (!state.isAgenticPlaytestPullRequest(pull, repository)) continue;
              const number = pull.number;
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: number,
                per_page: 100,
              });
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: number,
                per_page: 100,
              });
              if (state.isTerminal(comments)) continue;

              const head = pull.head.sha;
              const workflowRuns = await github.paginate(
                github.rest.actions.listWorkflowRunsForRepo,
                {
                  owner,
                  repo,
                  head_sha: head,
                  event: "pull_request",
                  per_page: 100,
                },
              );
              const ci = state.workflowRunState(workflowRuns);
              const missing = state.missingRequiredReviewers(
                reviews,
                comments,
                head,
              );
              const barrier = state.barrierMarker(head);
              const barrierComment = comments.find((comment) =>
                comment.body?.includes(barrier),
              );
              const barrierAgeMs = barrierComment
                ? Date.now() - new Date(
                    barrierComment.updated_at || barrierComment.created_at,
                  ).getTime()
                : Number.POSITIVE_INFINITY;
              if (
                !missing.length &&
                ci.status === "completed" &&
                (!barrierComment || barrierAgeMs >= 20 * 60 * 1000)
              ) {
                const cycle = state.copilotReviewedHeads(reviews).length;
                const finalVerification = state.hasCapPendingForHead(
                  comments,
                  head,
                );
                const lockBody = `${barrier}\nRequired reviews are in for \`${head}\` and CI completed with **${ci.conclusion}**. The watchdog is recovering adjudication cycle ${cycle} of 3${finalVerification ? " for final cap verification" : ""}.`;
                let lock;
                if (barrierComment) {
                  const response = await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: barrierComment.id,
                    body: lockBody,
                  });
                  lock = response.data;
                } else {
                  const response = await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: number,
                    body: lockBody,
                  });
                  lock = response.data;
                }
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner,
                    repo,
                    workflow_id: "playtest-review-adjudicator.lock.yml",
                    ref: context.payload.repository.default_branch,
                    inputs: {
                      pull_request_number: String(number),
                      head_sha: head,
                      cycle: String(cycle),
                      ci_conclusion: String(ci.conclusion),
                      ci_run_id: String(ci.run.id),
                      final_verification: String(finalVerification),
                    },
                  });
                } catch (error) {
                  if (barrierComment) {
                    await github.rest.issues.updateComment({
                      owner,
                      repo,
                      comment_id: lock.id,
                      body: `${lockBody}\n\nDispatch failed and will be retried: ${error.message}`,
                    });
                  } else {
                    await github.rest.issues.deleteComment({
                      owner,
                      repo,
                      comment_id: lock.id,
                    });
                  }
                  throw error;
                }
                continue;
              }
              const waitingOn = [...missing];
              if (ci.status !== "completed") waitingOn.push("CI");
              if (!waitingOn.length) continue;

              const { data: commit } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: head,
              });
              const committedAt = commit.commit.committer?.date || commit.commit.author?.date;
              const ageMs = Date.now() - new Date(committedAt).getTime();
              if (ageMs < 20 * 60 * 1000) continue;

              const marker = state.waitingMarker(head);
              const body = `${marker}\nReview round is still waiting on: **${waitingOn.join(", ")}** for \`${head}\`. Silence or pending CI is not treated as a clean review; the watchdog will check again.`;
              const existing = comments.find((comment) => comment.body?.includes(marker));
              if (existing) {
                if (existing.body !== body) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                    body,
                  });
                }
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: number,
                  body,
                });
              }
            }
