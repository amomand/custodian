name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: JS syntax check
        run: node --check src/custodian/web_static/app.js
      - name: Agentic review controller tests
        run: node --test tests/test_agentic_review_state.cjs
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Compile sources
        run: python -m compileall src tests tools main.py
      - name: Terminal smoke test
        run: printf 'can you handle it?\nquit\n' | CUSTODIAN_AI=off python main.py
      - name: Playtest scenario smoke test
        run: python tools/playtest_runner.py --all --summary-only

  no-sdk:
    name: No-SDK deterministic fallback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
      - name: Install without OpenAI SDK
        run: python -m pip install --upgrade pip
      - name: Confirm OpenAI SDK is absent
        run: |
          if python -c "import openai" 2>/dev/null; then
            echo "openai must not be installed for this job" >&2
            exit 1
          fi
      - name: Run tests without SDK
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Terminal smoke test without SDK
        run: printf 'can you handle it?\nquit\n' | CUSTODIAN_AI=off python main.py
